<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biogradix — Blog</title>
<meta name="description" content="Blog biogradix. Ciencia, educación y novedades sobre péptidos y bioactivos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   biogradix — Global Styles · Brand Book v1.0
   ═══════════════════════════════════════════════════════ */

/* ── RESET ──────────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:'DM Sans',sans-serif;background:var(--bx-cloud);color:var(--bx-navy);min-height:100vh;overflow-x:hidden;font-size:15px;line-height:1.7}
::selection{background:rgba(15,110,86,0.15);color:#0B1A2B}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font-family:inherit}
img{display:block;max-width:100%}

/* ── TOKENS ─────────────────────────────────────────── */
:root{
  --bx-navy:#0B1A2B;
  --bx-teal:#0F6E56;
  --bx-mint:#E1F5EE;
  --bx-cloud:#FAFBFC;
  --bx-silver:#E8EAED;
  --bx-deep-teal:#085041;
  --bx-active-teal:#1D9E75;
  --bx-gold:#C9A84C;
  --bx-alert:#D4534E;
  --bx-text-primary:#0B1A2B;
  --bx-text-secondary:#4A5568;
  --bx-text-tertiary:#8A9BAD;
  --bx-font-display:'Instrument Serif',serif;
  --bx-font-heading:'DM Sans',sans-serif;
  --bx-font-body:'DM Sans',sans-serif;
  --bx-font-mono:'DM Mono',monospace;
  --bx-space-xs:4px;--bx-space-sm:8px;--bx-space-md:12px;--bx-space-base:16px;
  --bx-space-lg:24px;--bx-space-xl:32px;--bx-space-2xl:48px;--bx-space-3xl:64px;--bx-space-4xl:80px;
  --bx-radius-sm:4px;--bx-radius-md:8px;--bx-radius-lg:12px;--bx-radius-xl:16px;--bx-radius-pill:999px;
}

/* ── LAYOUT ─────────────────────────────────────────── */
.bx-container{max-width:1200px;margin:0 auto;padding:0 48px}
.bx-section{padding:var(--bx-space-4xl) 0}

/* ── ANIMATIONS ─────────────────────────────────────── */
@keyframes bxFadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bxFadeIn{from{opacity:0}to{opacity:1}}
@keyframes bxSlideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bxLineGrow{from{width:0}to{width:48px}}
.bx-anim-up{animation:bxFadeUp .6s ease both}
.bx-anim-up-1{animation:bxFadeUp .6s ease .1s both}
.bx-anim-up-2{animation:bxFadeUp .6s ease .2s both}
.bx-anim-up-3{animation:bxFadeUp .6s ease .3s both}

/* ── HELIX SVG (inline reusable) ────────────────────── */
.bx-helix-pattern{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;opacity:.06}

/* ── NAV ────────────────────────────────────────────── */
.bx-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid var(--bx-silver);height:64px}
.bx-nav-inner{display:flex;justify-content:space-between;align-items:center;height:64px}
.bx-logo{display:inline-flex;align-items:center;gap:8px;text-decoration:none}
.bx-logo-helix{flex-shrink:0}
.bx-logo-text{font-family:var(--bx-font-heading);font-weight:500;font-size:18px;letter-spacing:-.3px}
.bx-logo-text .b{color:var(--bx-teal)}
.bx-logo-text .g{color:var(--bx-navy)}
.bx-nav-links{display:flex;align-items:center;gap:24px}
.bx-nav-link{font-family:var(--bx-font-body);font-size:13px;color:var(--bx-text-secondary);transition:color .2s}
.bx-nav-link:hover,.bx-nav-link.active{color:var(--bx-text-primary);font-weight:500}
.bx-nav-cta{display:inline-flex;align-items:center;gap:6px;background:var(--bx-teal);color:#fff;padding:8px 20px;border-radius:var(--bx-radius-md);font-family:var(--bx-font-body);font-size:12px;font-weight:500;transition:background .2s;white-space:nowrap}
.bx-nav-cta:hover{background:var(--bx-deep-teal)}
.bx-lang-toggle{display:flex;gap:2px}
.bx-lang-btn{font-family:var(--bx-font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:6px 10px;border-radius:var(--bx-radius-sm);transition:all .2s}
.bx-lang-btn.active{background:rgba(11,26,43,0.06);color:var(--bx-navy)}
.bx-lang-btn:not(.active){color:var(--bx-text-tertiary)}

/* ── TRUST BAR ──────────────────────────────────────── */
.bx-trust-bar{background:var(--bx-navy);height:32px;display:flex;align-items:center;justify-content:center;margin-top:64px}
.bx-trust-bar span{font-family:var(--bx-font-mono);font-size:10px;letter-spacing:.5px;color:rgba(255,255,255,.5)}

/* ── SECTION HEADERS ────────────────────────────────── */
.bx-section-label{font-family:var(--bx-font-mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--bx-teal);margin-bottom:var(--bx-space-sm)}
.bx-section-title{font-family:var(--bx-font-display);font-size:clamp(28px,4vw,48px);font-weight:400;color:var(--bx-navy);margin-bottom:var(--bx-space-md);letter-spacing:-.5px}
.bx-section-desc{font-family:var(--bx-font-body);font-size:15px;color:var(--bx-text-secondary);max-width:560px;line-height:1.7;margin-bottom:var(--bx-space-2xl)}

/* ── BUTTONS ────────────────────────────────────────── */
.bx-btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--bx-teal);color:#fff;padding:12px 28px;border-radius:var(--bx-radius-md);font-family:var(--bx-font-body);font-size:14px;font-weight:500;transition:all .2s;white-space:nowrap}
.bx-btn-primary:hover{background:var(--bx-deep-teal);transform:translateY(-1px)}
.bx-btn-ghost{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--bx-navy);padding:12px 28px;border-radius:var(--bx-radius-md);font-family:var(--bx-font-body);font-size:14px;border:1px solid var(--bx-silver);transition:all .2s;white-space:nowrap}
.bx-btn-ghost:hover{border-color:var(--bx-teal);color:var(--bx-teal)}
.bx-btn-wa{display:inline-flex;align-items:center;gap:8px;font-family:var(--bx-font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#fff;background:var(--bx-teal);padding:14px 36px;border-radius:var(--bx-radius-md);font-weight:500;transition:all .2s}
.bx-btn-wa:hover{background:var(--bx-deep-teal);transform:translateY(-1px)}

/* ── CARDS ──────────────────────────────────────────── */
.bx-card{background:#fff;border:1px solid var(--bx-silver);border-radius:var(--bx-radius-lg);transition:box-shadow .25s ease,transform .25s ease}
.bx-card:hover{box-shadow:0 4px 24px rgba(11,26,43,.08);transform:translateY(-2px)}

/* ── PRODUCT CARD ───────────────────────────────────── */
.bx-product-card{background:#fff;border:1px solid var(--bx-silver);border-radius:var(--bx-radius-lg);overflow:hidden;transition:box-shadow .25s ease,transform .25s ease;position:relative;display:flex;flex-direction:column}
.bx-product-card:hover{box-shadow:0 4px 24px rgba(11,26,43,.08);transform:translateY(-2px)}
.bx-product-card.disabled{opacity:.55}
.bx-product-img{background:var(--bx-mint);padding:var(--bx-space-xl);display:flex;align-items:center;justify-content:center;min-height:120px;position:relative}
.bx-product-img .bx-vial-icon{width:36px;height:60px;background:rgba(15,110,86,.1);border-radius:6px;border:1px solid rgba(15,110,86,.15)}
.bx-product-img .bx-patch-icon{width:48px;height:30px;background:rgba(15,110,86,.1);border-radius:8px;border:1px solid rgba(15,110,86,.15)}
.bx-product-body{padding:20px;display:flex;flex-direction:column;gap:10px;flex:1}
.bx-product-cat{font-family:var(--bx-font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--bx-teal)}
.bx-product-name{font-family:var(--bx-font-heading);font-size:16px;font-weight:500;color:var(--bx-navy);cursor:pointer;transition:color .2s}
.bx-product-name:hover{color:var(--bx-teal)}
.bx-product-sub{font-family:var(--bx-font-mono);font-size:10px;color:var(--bx-text-tertiary);letter-spacing:.5px;margin-top:-6px}
.bx-product-desc{font-family:var(--bx-font-body);font-size:12px;color:var(--bx-text-secondary);line-height:1.6;flex:1}
.bx-product-specs{font-family:var(--bx-font-mono);font-size:11px;color:rgba(15,110,86,.6);letter-spacing:.3px}
.bx-product-badge{position:absolute;top:12px;right:12px;font-family:var(--bx-font-mono);font-size:9px;letter-spacing:1px;padding:4px 8px;border-radius:var(--bx-radius-sm);font-weight:500;text-transform:uppercase}
.bx-product-badge.featured{background:var(--bx-gold);color:#fff}
.bx-product-badge.available{background:var(--bx-mint);color:var(--bx-deep-teal)}

/* Format toggle */
.bx-format-section{border-top:1px solid var(--bx-silver);padding:14px 20px;display:flex;flex-direction:column;gap:12px}
.bx-format-toggle{display:inline-flex;background:var(--bx-cloud);border:1px solid var(--bx-silver);border-radius:6px;overflow:hidden}
.bx-format-btn{font-family:var(--bx-font-mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.bx-format-btn.active{background:var(--bx-navy);color:#fff}
.bx-format-btn:not(.active){color:var(--bx-text-tertiary)}
.bx-format-btn:not(.active):hover{background:var(--bx-silver)}
.bx-price-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.bx-price{font-family:var(--bx-font-display);font-size:20px;color:var(--bx-navy)}
.bx-price .cur{font-family:var(--bx-font-body);font-size:11px;color:var(--bx-text-tertiary)}
.bx-sub-line{display:flex;align-items:center;gap:6px;margin-top:2px}
.bx-sub-link{font-family:var(--bx-font-mono);font-size:10px;color:var(--bx-teal);cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.bx-sub-save{font-family:var(--bx-font-mono);font-size:9px;background:var(--bx-mint);color:var(--bx-deep-teal);padding:2px 6px;border-radius:2px}
.bx-patch-note{font-family:var(--bx-font-mono);font-size:9px;color:var(--bx-active-teal);background:rgba(29,158,117,.08);padding:3px 8px;border-radius:3px}
.bx-order-btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--bx-font-body);font-size:11px;font-weight:500;padding:6px 14px;border-radius:6px;background:var(--bx-teal);color:#fff;transition:background .2s;white-space:nowrap}
.bx-order-btn:hover{background:var(--bx-deep-teal)}
.bx-order-btn.disabled{background:var(--bx-silver);color:var(--bx-text-tertiary);cursor:not-allowed}
.bx-purity{font-family:var(--bx-font-mono);font-size:11px;color:var(--bx-text-tertiary)}
.bx-detail-link{font-family:var(--bx-font-mono);font-size:10px;color:var(--bx-teal);cursor:pointer;text-decoration:underline;text-underline-offset:2px;background:none;border:none;padding:0}

/* Status tags */
.bx-status{display:inline-flex;align-items:center;gap:6px;font-family:var(--bx-font-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:var(--bx-radius-pill);font-weight:500}
.bx-status.in-stock{background:var(--bx-mint);color:var(--bx-deep-teal)}
.bx-status.pre-order{background:#FFF8E1;color:#7B6200}
.bx-status.pending{background:#FFF8E1;color:#7B6200}
.bx-status.out-of-stock{background:#FCE4EC;color:#7B1A1A}

/* Category filters */
.bx-cat-filters{display:flex;gap:4px;flex-wrap:wrap}
.bx-cat-btn{font-family:var(--bx-font-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:6px 12px;border:1px solid var(--bx-silver);border-radius:var(--bx-radius-sm);transition:all .2s;color:var(--bx-text-tertiary)}
.bx-cat-btn:hover{border-color:rgba(15,110,86,.2);color:var(--bx-text-secondary)}
.bx-cat-btn.active{background:var(--bx-mint);color:var(--bx-deep-teal);border-color:rgba(15,110,86,.2)}

/* Grids */
.bx-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--bx-space-base)}
.bx-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--bx-space-base)}
.bx-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--bx-space-lg)}

/* ── PILLAR CARD ────────────────────────────────────── */
.bx-pillar{background:#fff;border:1px solid var(--bx-silver);border-radius:var(--bx-radius-lg);padding:var(--bx-space-lg) 20px;transition:all .3s}
.bx-pillar:hover{border-color:rgba(15,110,86,.2);transform:translateY(-2px);box-shadow:0 4px 24px rgba(11,26,43,.06)}
.bx-pillar-icon{width:40px;height:40px;border-radius:10px;background:var(--bx-mint);display:flex;align-items:center;justify-content:center;margin-bottom:var(--bx-space-base)}
.bx-pillar-icon-inner{width:16px;height:16px;border-radius:4px;background:var(--bx-teal)}
.bx-pillar h3{font-family:var(--bx-font-heading);font-size:14px;font-weight:600;color:var(--bx-navy);margin-bottom:var(--bx-space-sm)}
.bx-pillar p{font-family:var(--bx-font-body);font-size:12px;color:var(--bx-text-secondary);line-height:1.7}

/* ── MODAL ──────────────────────────────────────────── */
.bx-modal-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;animation:bxFadeIn .2s ease}
.bx-modal-backdrop{position:fixed;inset:0;background:rgba(11,26,43,.6);backdrop-filter:blur(4px)}
.bx-modal{position:relative;background:#fff;border-radius:var(--bx-radius-xl);max-width:640px;width:100%;max-height:85vh;overflow-y:auto;padding:36px;box-shadow:0 24px 48px rgba(0,0,0,.15);animation:bxSlideDown .3s ease}
.bx-modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--bx-space-lg)}
.bx-modal-header h2{font-family:var(--bx-font-display);font-size:22px;color:var(--bx-navy);font-weight:400}
.bx-modal-close{width:32px;height:32px;border-radius:50%;background:var(--bx-silver);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--bx-navy);transition:background .2s}
.bx-modal-close:hover{background:#ddd}
.bx-modal-body{font-family:var(--bx-font-body);font-size:13px;color:var(--bx-text-secondary);line-height:1.8}
.bx-modal-body strong{color:var(--bx-navy)}
.bx-modal-body p{margin-bottom:12px}
.bx-modal-body h3{font-family:var(--bx-font-heading);font-size:15px;font-weight:600;color:var(--bx-navy);margin:20px 0 8px}
.bx-modal-body ul{margin:0 0 12px 20px}
.bx-modal-body li{margin-bottom:6px;font-size:13px}
.bx-modal-section{background:var(--bx-mint);border-radius:var(--bx-radius-lg);padding:16px 20px;margin:12px 0}
.bx-modal-section p{color:var(--bx-deep-teal);margin-bottom:4px}

/* ── FOOTER ─────────────────────────────────────────── */
.bx-footer{background:var(--bx-navy);padding:var(--bx-space-2xl) 0 var(--bx-space-lg)}
.bx-footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:var(--bx-space-xl);margin-bottom:40px}
.bx-footer-col-title{font-family:var(--bx-font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:var(--bx-space-md)}
.bx-footer-col a,.bx-footer-col span{display:block;font-family:var(--bx-font-body);font-size:13px;color:rgba(255,255,255,.6);line-height:2;transition:color .2s}
.bx-footer-col a:hover{color:rgba(255,255,255,.9)}
.bx-footer-tagline{font-family:var(--bx-font-display);font-style:italic;font-size:13px;color:rgba(255,255,255,.3);margin-top:8px}
.bx-footer-bottom{border-top:1px solid rgba(255,255,255,.08);padding-top:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.bx-footer-legal{font-family:var(--bx-font-mono);font-size:10px;color:rgba(255,255,255,.2);letter-spacing:.5px}
.bx-footer-legal a{text-decoration:underline;text-underline-offset:2px}
.bx-footer-disc{font-family:var(--bx-font-body);font-size:11px;color:rgba(255,255,255,.15);line-height:1.6;max-width:680px;margin-top:var(--bx-space-base)}

/* ── FAQ ACCORDION ──────────────────────────────────── */
.bx-faq-item{border-bottom:1px solid var(--bx-silver)}
.bx-faq-q{display:flex;justify-content:space-between;align-items:center;padding:20px 0;cursor:pointer;font-family:var(--bx-font-body);font-size:15px;font-weight:500;color:var(--bx-navy);transition:color .2s;width:100%;text-align:left}
.bx-faq-q:hover{color:var(--bx-teal)}
.bx-faq-chevron{width:20px;height:20px;color:var(--bx-teal);transition:transform .3s;flex-shrink:0}
.bx-faq-item.open .bx-faq-chevron{transform:rotate(180deg)}
.bx-faq-a{max-height:0;overflow:hidden;transition:max-height .3s ease;font-family:var(--bx-font-body);font-size:14px;color:var(--bx-text-secondary);line-height:1.7}
.bx-faq-item.open .bx-faq-a{max-height:500px}
.bx-faq-a-inner{padding:0 0 20px}

/* ── STEP CARDS ─────────────────────────────────────── */
.bx-step-card{background:#fff;border:1px solid var(--bx-silver);border-radius:var(--bx-radius-lg);padding:var(--bx-space-lg)}
.bx-step-card:hover{box-shadow:0 4px 24px rgba(11,26,43,.06)}
.bx-step-num{font-family:var(--bx-font-mono);font-size:11px;letter-spacing:2px;color:var(--bx-teal);font-weight:500;margin-bottom:var(--bx-space-base)}
.bx-step-card h4{font-family:var(--bx-font-heading);font-size:14px;font-weight:600;color:var(--bx-navy);margin-bottom:var(--bx-space-sm)}
.bx-step-card p{font-family:var(--bx-font-body);font-size:12px;color:var(--bx-text-secondary);line-height:1.7}

/* ── COMPARISON TABLE ───────────────────────────────── */
.bx-comp-table{width:100%;border-collapse:collapse;font-family:var(--bx-font-body)}
.bx-comp-table th{padding:12px 16px;font-size:11px;font-weight:400;color:var(--bx-text-tertiary);border-bottom:1px solid var(--bx-silver);letter-spacing:.3px}
.bx-comp-table th.highlight{font-weight:600;color:var(--bx-teal);background:var(--bx-mint)}
.bx-comp-table td{padding:13px 16px;font-size:12px;color:var(--bx-text-secondary);border-bottom:1px solid #F0F1F3}
.bx-comp-table td.highlight{color:var(--bx-teal);font-weight:500;background:rgba(225,245,238,.4)}
.bx-comp-table td.win{color:var(--bx-teal)}
.bx-comp-table td:first-child{font-weight:500;color:rgba(11,26,43,.6)}
.bx-comp-table tr:nth-child(even){background:var(--bx-cloud)}

/* ── PROTOCOL CARDS ─────────────────────────────────── */
.bx-proto-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:28px;position:relative;overflow:hidden;transition:box-shadow .25s}
.bx-proto-card:hover{box-shadow:0 8px 32px rgba(11,26,43,.08)}
.bx-proto-accent{position:absolute;top:0;left:0;right:0;height:2px}
.bx-proto-card h3{font-family:var(--bx-font-heading);font-weight:600;font-size:15px;color:#fff;margin-bottom:6px}
.bx-proto-compounds{font-family:var(--bx-font-mono);font-size:11px;letter-spacing:.5px;margin-bottom:12px}
.bx-proto-goals{font-family:var(--bx-font-body);font-size:12px;color:rgba(255,255,255,.4);line-height:1.6;margin-bottom:16px}
.bx-proto-note{background:rgba(255,255,255,.05);border-radius:6px;padding:10px 14px;display:flex;align-items:center;gap:8px}
.bx-proto-note-dot{width:5px;height:5px;border-radius:50%;background:rgba(201,168,76,.7);flex-shrink:0}
.bx-proto-note span{font-family:var(--bx-font-mono);font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.5px}

/* ── VIDEO CARD ─────────────────────────────────────── */
.bx-video-card{background:#fff;border:1px solid var(--bx-silver);border-radius:var(--bx-radius-lg);overflow:hidden;transition:box-shadow .25s,transform .25s}
.bx-video-card:hover{box-shadow:0 4px 24px rgba(11,26,43,.08);transform:translateY(-2px)}
.bx-video-thumb{background:var(--bx-mint);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative}
.bx-play-btn{width:48px;height:48px;border-radius:50%;background:var(--bx-teal);display:flex;align-items:center;justify-content:center;transition:transform .2s}
.bx-video-card:hover .bx-play-btn{transform:scale(1.1)}
.bx-video-info{padding:16px 20px}

window.setLang = function(newLang){
  lang = newLang;
  localStorage.setItem("bx-lang", lang);
  if(newLang==="es"&&CATS_EN.includes(filter)){
    const idx=CATS_EN.indexOf(filter); filter=CATS_ES[idx]||"Todos";
  } else if(newLang==="en"&&CATS_ES.includes(filter)){
    const idx=CATS_ES.indexOf(filter); filter=CATS_EN[idx]||"All";
  }
  document.querySelectorAll(".bx-lang-btn").forEach(btn=>{
    btn.classList.toggle("active", btn.textContent.trim()===lang.toUpperCase());
  });
  document.querySelectorAll("[data-es][data-en]").forEach(el=>{
    el.textContent=el.dataset[lang];
  });
  // Update WhatsApp links
  const navWa=document.getElementById("nav-wa");
  if(navWa) navWa.href=`https://wa.me/${WA}?text=${encodeURIComponent(T[lang].ctaMsg)}`;
  const ctaWa=document.getElementById("cta-wa");
  if(ctaWa) ctaWa.href=`https://wa.me/${WA}?text=${encodeURIComponent(T[lang].ctaMsg)}`;

  if(typeof renderCatalog==="function"&&document.getElementById("products-grid")) renderCatalog();
  renderFooter();
};

    const date=es?p.date:p.dateEn;
    const cat=es?p.cat:p.catEn;
    return `<div class="bx-blog-card"><div class="bx-blog-thumb"></div><div class="bx-blog-body"><div class="bx-blog-cat">${cat}</div><div class="bx-blog-title">${title}</div><div class="bx-blog-excerpt">${excerpt}</div><div class="bx-blog-meta"><span>${date}</span><span>${p.read} ${es?"lectura":"read"}</span></div><span class="bx-blog-read">${es?"Leer más →":"Read more →"}</span></div></div>`;
  }).join("")||(es?"<p>No hay artículos en esta categoría.</p>":"<p>No articles in this category.</p>");
}

window.setBlogFilter=function(f){blogFilter=f;renderBlog();};

document.addEventListener("DOMContentLoaded",function(){
  const origSetLang=window.setLang;
  window.setLang=function(l){origSetLang(l);blogFilter="all";renderBlog();};
  renderBlog();
});
</script>
</body>
</html>
